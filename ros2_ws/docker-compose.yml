x-ros-env: &ros-env
  DEV: ${DEV:-false}
  PYTHONUNBUFFERED: 1
  FASTDDS_DEFAULT_PROFILES_FILE: /ros2_ws/fastdds_localhost.xml

services:
  ros2_frontend:
    image: nginx:alpine
    container_name: ros2_frontend
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      NGINX_ENVSUBST_FILTER: DOMAIN_NAME
    volumes:
      - ./src/web_server/frontend:/usr/share/nginx/html
      - ./src/web_server/frontend/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./src/web_server/certs:/etc/nginx/certs:ro
    network_mode: host
    restart: unless-stopped

  ros2_lidar:
    build:
      context: .
      dockerfile: lidar.dockerfile
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      <<: *ros-env
    network_mode: host
    ipc: host 
    privileged: true
    restart: unless-stopped

  ros2_diff_robot:
    build:
      context: .
      dockerfile: DiffDriveHardware.dockerfile
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/:/dev/
    environment:
      <<: *ros-env
      TTY_0: /dev/ttyACM0
      TTY_1: /dev/ttyACM1
      TTY_2: /dev/ttyACM2
      TTY_3: /dev/ttyACM3
    network_mode: host
    ipc: host 
    privileged: true
    restart: unless-stopped

  ros2_camera_rp:
    build:
      context: .
      dockerfile: CameraRp.dockerfile
    volumes:
      - .:/ros2_ws/
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
    devices:
      - /dev/:/dev/
    environment:
      <<: *ros-env
    network_mode: host
    ipc: host 
    privileged: true
    restart: unless-stopped


  ros2_nav2:
    build:
      context: .
      dockerfile: nav2.dockerfile
    ipc: host
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/:/dev/
    environment:
      <<: *ros-env
    network_mode: host
    privileged: true
    depends_on:
      - ros2_lidar
      - ros2_diff_robot
    restart: unless-stopped

  ros2_rosbridge:
    build:
      context: .
      dockerfile: Rosbridge.dockerfile
    ipc: host
    volumes:
      - .:/ros2_ws/
    environment:
      <<: *ros-env
      PYTHONDONTWRITEBYTECODE: 1
    network_mode: host
    restart: unless-stopped

  ros2_certbot:
    image: certbot/dns-route53
    volumes:
      - ./src/web_server/certs:/etc/letsencrypt
      - ./src/web_server/scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      HOSTED_ZONE_ID: ${HOSTED_ZONE_ID}
      DOMAIN_NAME: ${DOMAIN_NAME}
    entrypoint: /bin/sh /scripts/certbot_entrypoint.sh
    network_mode: host
    restart: "no"
