services:
  ds:
    image: ros:humble-ros-core
    network_mode: host
    ipc: host 
    environment:
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
    command: fastdds discovery -i 0 -l $HOST_IP -p 11811
    volumes:
      - .:/ros2_ws/:ro
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "process", "fastdds discovery"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  ros2_diff_robot:
    build:
      context: .
      dockerfile: DiffDriveHardware.dockerfile
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/:/dev/
    environment:
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
    network_mode: host
    ipc: host 
    privileged: true
    depends_on:
      ds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "topic", "cmd_vel"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  ros2_frontier_explorer:
    build:
      context: .
      dockerfile: FrontierExplorer.dockerfile
    ipc: host
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/:/dev/
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
      - PYTHONUNBUFFERED=1
    network_mode: host
    privileged: true
    depends_on:
      ds:
        condition: service_healthy
      ros2_slam:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "node", "explore"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  ros2_imu:
    build:
      context: .
      dockerfile: Imu.dockerfile
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - SERIAL_PORT=/dev/ttyACM0
      - ROS_SUPER_CLIENT=True
    network_mode: host
    ipc: host 
    privileged: true
    depends_on:
      ds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "topic", "imu"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  ros2_tof_camera:
    build:
      context: .
      dockerfile: Tof.dockerfile
    ipc: host
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/:/dev/
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
      - PYTHONUNBUFFERED=1
    network_mode: host
    privileged: true
    depends_on:
      ds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "topic", "scan_filtered"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  ros2_web_server:
    build:
      context: .
      dockerfile: WebServer.dockerfile
    volumes:
      - .:/ros2_ws/
      - /dev/:/dev/
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
      - PYTHONUNBUFFERED=1
      - ENABLE_FLASK_LOGS=false
    network_mode: host
    privileged: true
    device_cgroup_rules:
      - "c 13:* rwm"
      - "c 240:* rwm"
      - "c 189:* rwm" 
      - "c 29:* rwm"
    ipc: host 
    depends_on:
      ds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "node", "robot_web_server_node"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  ros2_slam:
    build:
      context: .
      dockerfile: Slam.dockerfile
    ipc: host
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/:/dev/
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
      - PYTHONUNBUFFERED=1
    network_mode: host
    privileged: true
    depends_on:
      ds:
        condition: service_healthy
      ros2_imu:
        condition: service_healthy
      ros2_tof_camera:
        condition: service_healthy
      ros2_diff_robot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "node", "slam"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  ros2_rosbridge:
    build:
      context: .
      dockerfile: Rosbridge.dockerfile
    ipc: host
    volumes:
      - .:/ros2_ws/
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
    network_mode: host
    depends_on:
      ds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "node", "rosbridge"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  ros2_knife_controller:
    build:
      context: .
      dockerfile: KnifeMotorController.dockerfile
    volumes:
      - .:/ros2_ws/
    devices:
      - /dev/ttyACM4:/dev/ttyACM4
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTDDS_BUILTIN_TRANSPORTS=DEFAULT
      - ROS_DISCOVERY_SERVER=${HOST_IP}:11811
      - ROS_SUPER_CLIENT=True
      - PYTHONUNBUFFERED=1
    network_mode: host
    ipc: host 
    privileged: true
    depends_on:
      ds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ros2_ws/healthcheck.sh", "node", "knife"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped
