<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Control</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="camera-section">
        <div class="video-container" id="videoContainer">
            <img id="cameraStream" src="" alt="Camera Stream">
            <div class="video-overlay">
                <span id="vin-display" class="overlay-value">🔋 --.--</span>
                <span id="charger-voltage-display" class="overlay-value">⚡ --.--</span>
                <span id="rpm-display" class="overlay-value">🕛 ---</span>
            </div>
            <div class="knife-control-overlay" id="knifeControlOverlay">
                <div class="knife-slider-row">
                    <span class="knife-label">🔪</span>
                    <input type="range" id="knifeSlider" min="0" max="3000" value="0" step="50" class="knife-slider">
                    <span id="knifeSliderValue" class="knife-value">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="map-section">
        <div id="map"></div>
        <div class="map-controls">
            <button id="dock-btn" class="map-btn map-btn-small">Dock</button>
            <button id="undock-btn" class="map-btn map-btn-small">Undock</button>
            <button id="save-map-btn" class="map-btn">Save Map</button>
            <button id="explore-btn" class="map-btn explore-btn-idle">Start Exploration</button>
        </div>
        <div class="map-controls coverage-controls">
            <button id="coverage-refresh-map-btn" class="map-btn coverage-btn-refresh">Refresh Map</button>
            <button id="coverage-preview-btn" class="map-btn coverage-btn-preview">Preview Coverage</button>
            <button id="coverage-execute-btn" class="map-btn coverage-btn-execute">Execute Coverage</button>
            <button id="coverage-stop-btn" class="map-btn coverage-btn-stop">Stop Coverage</button>
        </div>
        <div id="coverage-status" class="coverage-status">Coverage idle. Map boundary is auto-detected from SLAM. Click
            "Refresh Map" to re-extract, then "Preview Coverage" to plan.</div>
    </div>
    <!-- roslib v2.1.0 (ESM) – loaded as a module so action_feedback/result
         messages are routed correctly. Exposes window.rosAction for dock/undock. -->
    <script type="importmap">
    {
      "imports": {
        "roslib": "https://cdn.jsdelivr.net/npm/roslib@2.1.0/dist/RosLib.min.js",
        "eventemitter3": "https://cdn.jsdelivr.net/npm/eventemitter3@5/+esm",
        "uuid": "https://cdn.jsdelivr.net/npm/uuid@11/+esm",
        "bson": "https://cdn.jsdelivr.net/npm/bson@6/+esm",
        "cbor2": "https://cdn.jsdelivr.net/npm/cbor2@1/+esm",
        "fast-png": "https://cdn.jsdelivr.net/npm/fast-png@6/+esm"
      }
    }
    </script>
    <script type="module">
        import { Ros, Action, Service, Topic } from 'roslib';
        const ros = new Ros({ url: `ws://${window.location.hostname}:9090` });
        ros.on('connection', () => console.log('[roslib v2] Connected'));
        ros.on('error', (e) => console.error('[roslib v2] Error:', e));
        // Expose for map-viewer.js and robot-control.js
        window.rosAction = { ros, Action, Service, Topic };
    </script>
    <!-- Keep roslib v1.4.1 for ros3d (needs legacy ROSLIB global) -->
    <script src="https://cdn.jsdelivr.net/npm/roslib@1.4.1/build/roslib.js"></script>
    <script src="/robot-control.js?v=3"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.89.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ros3d@1.1.0/build/ros3d.min.js"></script>
    <script src="/map-viewer.js?v=3"></script>
</body>

</html>
